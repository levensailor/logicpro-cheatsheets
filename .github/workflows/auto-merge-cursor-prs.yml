name: Auto-merge Cursor Agent PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'cursor/')
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Check if PR is from Cursor agent
        id: check
        run: |
          if [[ "${{ github.event.pull_request.head.ref }}" == cursor/* ]]; then
            echo "is_cursor_pr=true" >> $GITHUB_OUTPUT
          else
            echo "is_cursor_pr=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Enable auto-merge
        if: steps.check.outputs.is_cursor_pr == 'true'
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
      
      - name: Comment on PR
        if: steps.check.outputs.is_cursor_pr == 'true'
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "🤖 Auto-merge enabled for Cursor agent PR. Will merge automatically when all checks pass."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
